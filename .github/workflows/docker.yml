name: "Docker"

on:
  workflow_dispatch:

  push:
    branches: ["master"]

  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: "Test"
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false
      matrix:
        item: ["8.5", "8.5-fpm"]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build image"
        uses: docker/build-push-action@v6
        with:
          context: "${{ matrix.item }}"
          load: true
          tags: "dockette/php:${{ matrix.item }}"

      - name: "Test image"
        run: "make test-${{ matrix.item }}"

  build:
    name: "Build"
    needs: ["test"]
    uses: dockette/.github/.github/workflows/docker.yml@master
    secrets: inherit
    with:
      image: "dockette/php"
      tag: "${{ matrix.item }}"
      context: "${{ matrix.item }}"
    strategy:
      matrix:
        include:
          - item: "5.6"
          - item: "5.6-fpm"
          - item: "7.0"
          - item: "7.0-fpm"
          - item: "7.1"
          - item: "7.1-fpm"
          - item: "7.2"
          - item: "7.2-fpm"
          - item: "7.3"
          - item: "7.3-fpm"
          - item: "7.4"
          - item: "7.4-fpm"
          - item: "8.0"
          - item: "8.0-fpm"
          - item: "8.1"
          - item: "8.1-fpm"
          - item: "8.2"
          - item: "8.2-fpm"
          - item: "8.3"
          - item: "8.3-fpm"
          - item: "8.4"
          - item: "8.4-fpm"
          - item: "8.5"
          - item: "8.5-fpm"

      fail-fast: false

  docs:
    name: "Docs"
    runs-on: "ubuntu-latest"
    needs: ["build"]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Update Docker Hub description"
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: "dockette/php"
